---

- name: Add public keys to user  # noqa jinja[spacing]
  ansible.posix.authorized_key:
    user: "{{ item.name }}"
    state: present
    key: "{{ authorized_key }}"
  when: item.authorized_key is defined or item.authorized_keys is defined
  loop: "{{ lookup('template', 'authorized_keys.yml.j2') | from_yaml }}"
  loop_control:
    loop_var: authorized_key
